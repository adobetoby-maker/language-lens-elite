name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: "https://pollhlkgltdkdskdzsgd.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvbGxobGtnbHRka2Rza2R6c2dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzkxMjYsImV4cCI6MjA5NDI1NTEyNn0.cLU4NaYrxCjrb4pFz483810rs33UASEcGP0U7tAA-8M"
          VITE_SUPABASE_PROJECT_ID: "pollhlkgltdkdskdzsgd"
          VITE_STRIPE_PRICE_MONTHLY: "price_1TbKk2QjohgWhWidZ7BQKWbL"
          VITE_STRIPE_PRICE_ANNUAL: "price_1TbKk4QjohgWhWid1m86409i"
          VITE_STRIPE_PRICE_FAMILY: "price_1TbKk5QjohgWhWidSuAbMeTq"

      - name: Deploy
        run: npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
